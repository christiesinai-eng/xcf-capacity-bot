name: XCF Daily Capacity Report

on:
  schedule:
    - cron: '0 16 * * 1-5'  # 4am NZT primary
    - cron: '0 17 * * 1-5'  # 5am NZT backup
    - cron: '0 18 * * 1-5'  # 6am NZT final backup
  workflow_dispatch:          # triggered by cron-job.org and manual runs

jobs:
  run-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run capacity report
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ASANA_WORKSPACE_GID: ${{ secrets.ASANA_WORKSPACE_GID }}
          ASANA_TEAM_GID: ${{ secrets.ASANA_TEAM_GID }}
          ASANA_FIELD_GID_ESTIMATED_TIME: ${{ secrets.ASANA_FIELD_GID_ESTIMATED_TIME }}
          ASANA_POD_MAP: ${{ secrets.ASANA_POD_MAP }}
        run: node src/index.js --once

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcf-capacity-report
          path: reports/xcf-report-*.html
          retention-days: 7
